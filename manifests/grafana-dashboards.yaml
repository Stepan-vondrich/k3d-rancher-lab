apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: monitoring
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: k8s
        orgId: 1
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-k8s
  namespace: monitoring
data:
  k8s-lab.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "schemaVersion": 39,
      "tags": ["k8s", "lab"],
      "templating": {"list": []},
      "time": {"from": "now-30m", "to": "now"},
      "title": "Kubernetes - Lab Overview (prod)",
      "uid": "k8s-lab-overview",
      "version": 1,
      "panels": [
        {
          "id": 1, "type": "stat", "title": "Running pods",
          "gridPos": {"h": 5, "w": 6, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum(kube_pod_status_phase{phase=\"Running\"})"}]
        },
        {
          "id": 2, "type": "stat", "title": "Ready nodes",
          "gridPos": {"h": 5, "w": 6, "x": 6, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"})"}]
        },
        {
          "id": 3, "type": "stat", "title": "Deployments",
          "gridPos": {"h": 5, "w": 6, "x": 12, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "count(kube_deployment_created)"}]
        },
        {
          "id": 4, "type": "stat", "title": "Namespaces",
          "gridPos": {"h": 5, "w": 6, "x": 18, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "count(kube_namespace_created)"}]
        },
        {
          "id": 5, "type": "timeseries", "title": "Available replicas by namespace",
          "gridPos": {"h": 9, "w": 12, "x": 0, "y": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum by (namespace) (kube_deployment_status_replicas_available)", "legendFormat": "{{namespace}}"}]
        },
        {
          "id": 6, "type": "timeseries", "title": "CPU cores by namespace (rate 5m)",
          "gridPos": {"h": 9, "w": 12, "x": 12, "y": 5},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"refId": "A", "expr": "sum by (namespace) (rate(container_cpu_usage_seconds_total{image!=\"\"}[5m]))", "legendFormat": "{{namespace}}"}]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.4.0
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "CHANGE_ME_GRAFANA_PW"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 300Mi
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: dashboards
          configMap:
            name: grafana-dashboard-k8s
